  /hardwareitems/{xref}/pricewithoptions:
    get:
      summary: Price and description of an item with options
      description: "Gets the price and updated description of a hardware item with\
        \ a set of options.<br>Length, width, and height are only required if the\
        \ hardware item has a specific size. All 3 values do not need to be provided,\
        \ either length or width and height should be specified. Setting all 3 will\
        \ throw an error."
      operationId: getHardwareItemPriceWithOptions
      tags:
      - hardware
      parameters:
      - description: hardware item xref
        name: xref
        in: path
        required: true
        schema:
          type: integer
          format: int64
      - description: "hardware handing, will only be appended to the description if\
          \ the item is meant to be handed. Allowed values are LH, RH, LHR, and RHR"
        name: hand
        in: query
        schema:
          type: string
          pattern: ^(LH|RH|LHR|RHR)$
      - description: hardware item height
        name: height
        in: query
        schema:
          type: string
      - description: hardware item length
        name: length
        in: query
        schema:
          type: string
      - description: list of hardware option xrefs
        name: optionxref
        in: query
        schema:
          type: array
          items:
            type: integer
            format: int64
      - description: "Price Book to use for pricing. If this value is provided, future\
          \ pricing will not be returned in the response, only the price book requested."
        name: priceBook
        in: query
        schema:
          type: string
      - description: hardware item width
        name: width
        in: query
        schema:
          type: string
      responses:
        "200":
          description: OK
          content:
            application/json:
              example:
