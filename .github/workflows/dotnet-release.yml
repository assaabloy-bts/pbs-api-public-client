name: .NET - Build & Publish

on:
  push:
    tags:
      - 'v*'
    branches:
      - develop
      - 'release/**'
      - 'hotfix/**'
      - master
  pull_request:
    branches:
      - develop
      - master

jobs:
  build:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: dotnet

    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '8.0.x'

      - name: Set version from tag
        if: startsWith(github.ref, 'refs/tags/v')
        run: |
          VERSION="${GITHUB_REF#refs/tags/v}"
          echo "PACKAGE_VERSION=$VERSION" >> $GITHUB_ENV

      - name: Restore dependencies
        run: dotnet restore

      - name: Build
        run: |
          if [ -n "$PACKAGE_VERSION" ]; then
            dotnet build --no-restore --configuration Release /p:Version="$PACKAGE_VERSION"
          else
            dotnet build --no-restore --configuration Release
          fi

      - name: Test
        run: dotnet test --no-build --configuration Release --verbosity normal --collect:"XPlat Code Coverage"

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: dotnet-test-results
          path: dotnet/test/**/TestResults/

  publish:
    needs: build
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/v')
    defaults:
      run:
        working-directory: dotnet

    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '8.0.x'

      - name: Set version from tag
        run: |
          VERSION="${GITHUB_REF#refs/tags/v}"
          echo "PACKAGE_VERSION=$VERSION" >> $GITHUB_ENV

      - name: Build and pack
        run: dotnet build --configuration Release /p:Version="$PACKAGE_VERSION"

      - name: Push to NuGet
        run: dotnet nuget push src/PbsApiClient/bin/Release/*.nupkg --api-key ${{ secrets.NUGET_API_KEY }} --source https://api.nuget.org/v3/index.json --skip-duplicate

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: dotnet/src/PbsApiClient/bin/Release/*.nupkg
          generate_release_notes: true
